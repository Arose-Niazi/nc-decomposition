<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LU Decomposition Calculator — Doolittle, Crout, Cholesky &amp; PLU Methods | Step-by-Step Solutions</title>
    <meta name="description" content="Free online LU Decomposition calculator with step-by-step solutions. Supports Doolittle, Crout, Cholesky, and PLU (partial pivoting) methods for NxN matrices up to 6x6. Solve linear equations, find determinants, matrix inverses, and condition numbers.">
    <meta name="keywords" content="LU decomposition, matrix decomposition, Doolittle method, Crout method, Cholesky decomposition, PLU factorization, partial pivoting, linear algebra, matrix calculator, step by step, linear equations solver, determinant, matrix inverse, numerical methods">
    <meta name="author" content="Arose Niazi">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://nc.arose-niazi.me/">

    <!-- Open Graph -->
    <meta property="og:title" content="LU Decomposition Calculator — Step-by-Step Solutions">
    <meta property="og:description" content="Free online calculator for LU, Cholesky, and PLU decomposition with detailed step-by-step solutions. Supports matrices up to 6x6.">
    <meta property="og:url" content="https://nc.arose-niazi.me/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="NC Decomposition">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="LU Decomposition Calculator — Step-by-Step Solutions">
    <meta name="twitter:description" content="Free online calculator for LU, Cholesky, and PLU decomposition with detailed step-by-step solutions.">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4361ee">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="LU Decomp">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "LU Decomposition Calculator",
        "url": "https://nc.arose-niazi.me/",
        "description": "Free online LU Decomposition calculator with step-by-step solutions. Supports Doolittle, Crout, Cholesky, and PLU methods for NxN matrices.",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "author": { "@type": "Person", "name": "Arose Niazi", "url": "https://arose-niazi.me" },
        "educationalLevel": "University",
        "about": {
            "@type": "Thing",
            "name": "LU Decomposition",
            "description": "A method of decomposing a matrix into lower and upper triangular matrices"
        }
    }
    </script>

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css?v=3">

    <!-- Math.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.2.1/math.min.js" defer></script>
    <!-- App -->
    <script src="app.js?v=3" defer></script>
</head>
<body>

    <!-- Header -->
    <header class="site-header">
        <div class="header-inner">
            <h1 class="site-title">LU Decomposition<span>Calculator</span></h1>
            <div class="header-actions">
                <button id="history-toggle-btn" type="button" aria-label="Toggle history panel">History</button>
                <button id="theme-toggle" type="button" aria-label="Toggle dark mode">🌙</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="primary-area">

            <!-- Input Card -->
            <section class="card" aria-label="Matrix input">
                <h2 class="card-title">Matrix Input</h2>

                <!-- Controls -->
                <div class="controls-row">
                    <div class="control-group">
                        <label for="matrix-size">Size</label>
                        <select id="matrix-size">
                            <option value="2">2 &times; 2</option>
                            <option value="3" selected>3 &times; 3</option>
                            <option value="4">4 &times; 4</option>
                            <option value="5">5 &times; 5</option>
                            <option value="6">6 &times; 6</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="method-select">Method</label>
                        <select id="method-select">
                            <option value="doolittle">Doolittle</option>
                            <option value="crout">Crout</option>
                            <option value="cholesky">Cholesky</option>
                            <option value="plu">PLU (Pivoting)</option>
                        </select>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="solve-toggle">
                        <label for="solve-toggle">Solve Ax = b</label>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="compare-toggle">
                        <label for="compare-toggle">Compare methods</label>
                    </div>

                    <div class="control-group" id="compare-method-wrapper">
                        <label for="compare-method-select">Compare with</label>
                        <select id="compare-method-select">
                            <option value="doolittle">Doolittle</option>
                            <option value="crout" selected>Crout</option>
                            <option value="cholesky">Cholesky</option>
                            <option value="plu">PLU (Pivoting)</option>
                        </select>
                    </div>
                </div>

                <div id="cholesky-note" class="method-note">
                    Cholesky decomposition requires a symmetric positive definite matrix (A = LL&#7488;).
                </div>

                <!-- Matrix Grid -->
                <div class="matrix-input-section">
                    <h3>Matrix A</h3>
                    <div id="matrix-grid"></div>
                </div>

                <!-- B Vector -->
                <div id="b-vector-section">
                    <h3>Vector b</h3>
                    <div id="b-vector-inputs"></div>
                </div>

                <!-- Action Buttons -->
                <div class="btn-row">
                    <button id="calculate-btn" class="btn btn-primary" type="button">Calculate</button>
                    <button id="random-btn" class="btn btn-secondary" type="button">Random</button>
                    <button id="clear-btn" class="btn btn-secondary" type="button">Clear Output</button>
                    <button id="import-toggle-btn" class="btn btn-secondary" type="button">Import</button>
                </div>

                <!-- Import Area -->
                <div id="import-section">
                    <textarea id="import-text" placeholder="Paste matrix here. Rows separated by semicolons or newlines, columns by spaces or commas.&#10;Example: 1 2 3; 4 5 6; 7 8 9"></textarea>
                    <button id="import-btn" class="btn btn-small btn-secondary" type="button">Import Matrix</button>
                </div>

                <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.75rem;">
                    Tip: Press <kbd style="background:var(--bg-input);padding:1px 5px;border-radius:3px;border:1px solid var(--border-color);font-size:0.7rem;">Ctrl+Enter</kbd> to calculate
                </p>
            </section>

            <!-- Output -->
            <section id="output" aria-label="Calculation results"></section>
        </div>

        <!-- History Panel -->
        <aside id="history-panel">
            <div class="card">
                <h2 class="card-title">
                    History
                    <button id="clear-history-btn" class="btn btn-small btn-secondary" type="button">Clear</button>
                </h2>
                <div id="history-list"></div>
            </div>
        </aside>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-inner">
            <span>&copy; 2022&ndash;2026 Arose Niazi</span>
            <nav class="footer-links" aria-label="Footer links">
                <a href="https://github.com/Arose-Niazi/nc-decomposition" target="_blank" rel="noopener noreferrer">GitHub</a>
                <a href="https://arose-niazi.me" target="_blank" rel="noopener noreferrer">Author</a>
            </nav>
        </div>
    </footer>

</body>
</html>
